name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # necesario para que CodeQL pueda subir resultados

jobs:

  # ──────────────────────────────────────────────────
  # JOB 1: Tests + SAST
  # ──────────────────────────────────────────────────
  test:
    name: Tests + Análisis de Seguridad
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      # 4. Ejecutar tests de Django
      - name: Ejecutar tests
        run: |
          python manage.py test

      # 5. Análisis SAST con Bandit — más preciso que antes
      #    -ll  → solo Medium y High (antes reportaba todo el ruido Low)
      #    -ii  → solo Confidence Medium y High
      #    -x   → excluir venv, tests y migraciones
      - name: 🔒 Análisis SAST — Bandit
        run: |
          bandit -r . -ll -ii \
            -x ./venv,./.venv,./tests,./*/migrations

      # 6. Auditoría de dependencias — NUEVO
      #    Verifica que requirements.txt no tenga CVEs conocidos
      - name: 📦 Auditoría de dependencias — pip-audit
        run: |
          pip-audit -r requirements.txt

  # ──────────────────────────────────────────────────
  # JOB 2: CodeQL — análisis semántico profundo
  # NUEVO — complementa a Bandit con análisis de flujo
  # de datos entre archivos (taint analysis real)
  # ──────────────────────────────────────────────────
  codeql:
    name: 🔎 CodeQL — Análisis Semántico
    runs-on: ubuntu-latest
    # Corre en paralelo con el job test (no espera que termine)
    # Si quieres que corra solo si los tests pasan, agrega:
    # needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # Ruleset de seguridad extendido (más reglas que el default)
          queries: security-extended

      - name: Autodetectar build
        uses: github/codeql-action/autobuild@v4

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
          # Los resultados aparecen en:
          # Security → Code scanning alerts del repo

  # ──────────────────────────────────────────────────
  # JOB 3: Deploy — solo si test Y codeql pasan
  # ──────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy a Render
    needs: [test, codeql]   # antes solo dependía de test
    runs-on: ubuntu-latest
    # Solo deployar desde main, no desde PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
