name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # necesario para CodeQL

jobs:

  # ──────────────────────────────────────────────────
  # JOB 1: Tests + SAST
  # ──────────────────────────────────────────────────
  test:
    name: Tests + Análisis de Seguridad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit pytest pytest-django pytest-cov

      - name: Ejecutar tests con cobertura
        run: |
          python manage.py test

      - name: 🔒 Análisis SAST — Bandit
        run: |
          bandit -r . -ll -ii \
            -x ./venv,./.venv,./tests,./*/migrations,./vulnerable_app

      - name: 📦 Auditoría de dependencias — pip-audit
        run: |
          pip-audit -r requirements.txt

  # ──────────────────────────────────────────────────
  # JOB 2: CodeQL
  # ──────────────────────────────────────────────────
  codeql:
    name: 🔎 CodeQL — Análisis Semántico
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Autodetectar build
        uses: github/codeql-action/autobuild@v4

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ──────────────────────────────────────────────────
  # JOB 3: DAST — OWASP ZAP Baseline Scan
  # Requiere que test y codeql pasen primero.
  # Levanta la app Django en background y la escanea.
  # ──────────────────────────────────────────────────
  dast:
    name: 🎯 DAST — OWASP ZAP
    needs: [test, codeql]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar Django para staging local
        run: |
          # Permitir localhost en ALLOWED_HOSTS para el escaneo
          echo "DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1" >> $GITHUB_ENV
          echo "DJANGO_DEBUG=True" >> $GITHUB_ENV

      - name: Inicializar base de datos y crear usuario de prueba
        run: |
          python manage.py migrate --run-syncdb
          python manage.py shell -c "
          from django.contrib.auth.models import User
          if not User.objects.filter(username='admin').exists():
              User.objects.create_superuser('admin', 'admin@lab.local', 'admin123')
              User.objects.create_user('student', 'student@lab.local', 'student123')
              print('Usuarios de prueba creados')
          "

      - name: 🚀 Iniciar servidor Django (staging efímero)
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Esperar que la app levante
          for i in {1..15}; do
            curl -sf http://localhost:8000/ > /dev/null 2>&1 && break
            echo "Esperando servidor... ($i/15)"
            sleep 2
          done

      - name: Verificar que la app responde
        run: |
          curl -f http://localhost:8000/ || (echo "❌ La app no responde" && exit 1)
          echo "✅ App disponible en localhost:8000"

      - name: 🔍 ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: true
          cmd_options: '-z "-config pipeline.failBySeverity=High"'
          artifact_name: 'zap-baseline-report'
          # El reporte HTML se genera automáticamente como report_html.html

      - name: 📊 Subir reporte ZAP como Artifact
        uses: actions/upload-artifact@v4
        if: always()  # subir incluso si el scan falla — necesitamos ver los hallazgos
        with:
          name: zap-baseline-report-${{ github.job }}-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  # ──────────────────────────────────────────────────
  # JOB 4: Deploy — solo si test, codeql Y dast pasan
  # ──────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy a Render
    needs: [test, codeql, dast]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
